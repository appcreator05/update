<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> </title>
    
    <style>
        /* ডিফল্ট অবস্থায় পুরো পেজ সম্পূর্ণ ব্লাঙ্ক এবং হিডেন থাকবে */
        html, body {
            background-color: #ffffff !important;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
        }
        #secure-content {
            display: none; /* ভেরিফাই না হওয়া পর্যন্ত পুরোপুরি অদৃশ্য */
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 100px;
        }
        .btn-open-app {
            display: inline-block;
            padding: 14px 28px;
            background-color: #3399cc;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(51, 153, 204, 0.3);
            margin-top: 20px;
        }
        h2 { color: #333; }
        p { color: #666; }
    </style>

    <script type="text/javascript">
        function verifyPaymentAndLock() {
            // URL এর প্যারামিটারগুলো চেক করার জন্য
            var urlParams = new URLSearchParams(window.location.search);
            
            // Razorpay এর সফল পেমেন্টের প্যারামিটার ডিটেক্ট করা
            var paymentId = urlParams.get('razorpay_payment_id');
            var paymentLinkId = urlParams.get('razorpay_payment_link_id');

            // 🔒 কড়া সিকিউরিটি চেক: যদি পেমেন্ট আইডি অথবা লিংক আইডি থাকে
            if (paymentId !== null || paymentLinkId !== null) {
                
                // টাইপো ফিক্সড: এবার পারফেক্টলি ব্লক ওপেন হবে
                document.getElementById("secure-content").style.display = "block";
                
                // অটোমেটিক অ্যাপ ওপেন করার ইন্টেন্ট ট্রিগার
                var targetIntent = "intent://imdb-review-go.blogspot.com/#Intent;scheme=https;package=com.sayantika.eara;end";
                if( /Windows|Android|compatible|Macintosh|KaiOS|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|UC Browser|Opera Mini/i.test(navigator.userAgent) ) { 
                    window.location.href = targetIntent; 
                }
                
            } else {
                // যদি পেমেন্ট আইডি না থাকে, তবে পুরো পেজের কন্টেন্ট ধ্বংস করে দেওয়া হবে
                document.body.innerHTML = "";
                document.body.style.background = "#ffffff";
                console.log("Access Denied: No Valid Payment Token Found.");
            }
        }
    </script>
</head>
<body onload="verifyPaymentAndLock()">

    <!-- এই অংশটি শুধুমাত্র আসল পেমেন্ট ভেরিফিকেশনের পরেই লোড হবে -->
    <div id="secure-content">
        <h2>Payment Success!</h2>
        <p>আপনাকে অ্যাপে ফিরিয়ে নেওয়া হচ্ছে, দয়া করে অপেক্ষা করুন...</p>
        
        <a class="btn-open-app" href="intent://imdb-review-go.blogspot.com/#Intent;scheme=https;package=com.sayantika.eara;end">
            Open App Manually
        </a>
    </div>

</body>
</html>
